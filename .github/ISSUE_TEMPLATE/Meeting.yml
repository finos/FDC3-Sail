name: Sail Project Meeting
description: Create a new FDC3 Sail Project Meeting issue
title: "FDC3 Sail Project Meeting - "
labels:
  - meeting
body:
  - type: input
    id: date
    attributes:
      label: Date & Time
      description: Meeting date and time in UTC
      placeholder: "2026 March 16th - 14:00 UTC"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Meeting Notices
        - FINOS **Project leads** are responsible for observing the FINOS guidelines for [running project meetings](https://github.com/finos/community/blob/main/docs/governance/Meeting-Procedures.md#run-the-meeting). Project maintainers can find additional resources in the [FINOS Maintainers Cheatsheet](https://odp.finos.org/docs/finos-maintainers-cheatsheet/).

        - **All participants** in FINOS project meetings are subject to the [LF Antitrust Policy](https://www.linuxfoundation.org/antitrust-policy/), the [FINOS Community Code of Conduct](https://github.com/finos/community/blob/main/docs/governance/Code-of-Conduct.md) and all other [FINOS policies](https://github.com/finos/community/tree/main/docs/governance/policies).

        - FINOS meetings involve participation by industry competitors, and it is the intention of FINOS and the Linux Foundation to conduct all of its activities in accordance with applicable antitrust and competition laws. It is therefore extremely important that attendees adhere to meeting agendas, and be aware of, and not participate in, any activities that are prohibited under applicable US state, federal or foreign antitrust and competition laws. Please contact legal@finos.org with any questions.

        - FINOS project meetings may be recorded for use solely by the FINOS team for administration purposes. In very limited instances, and with explicit approval, recordings may be made more widely available.

        ## Tracking Attendance
        Those logged in using the LF Meetings will be automatically tracked.

  - type: textarea
    id: agenda
    attributes:
      label: Agenda
      description: "Replace PREVIOUS_ISSUE_NUMBER with the previous meeting issue number (e.g. 215) — GitHub will auto-link it."
      value: |
        - [ ] Convene & roll call (5mins)
        - [ ] Display [FINOS Antitrust Policy summary slide](https://github.com/finos/community/blob/main/docs/governance/Compliance-Slides/Antitrust-Compliance-Slide.pdf)
        - [ ] Review Meeting Notices (see above)
        - [ ] Review action items from previous meeting #PREVIOUS_ISSUE_NUMBER (5mins)
        - [ ] AOB, Q&A & Adjourn (5mins)
    validations:
      required: true

  - type: textarea
    id: action_items
    attributes:
      label: Action Items
      value: "- [ ] "

  - type: textarea
    id: minutes
    attributes:
      label: Meeting Minutes
