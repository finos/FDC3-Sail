name: Linters
on:
  push:
    paths:
      - "**.js"
      - "**.ts"
      - "**.tsx"
      - "package-lock.json"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "**.js"
      - "**.ts"
      - "**.tsx"
      - "package-lock.json"
      - ".github/workflows/lint.yml"

defaults:
  run:
    shell: "bash"

jobs:
  eslint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      # TODO: Install not all dependencies, but only those required for this workflow
      - name: Install dependencies
        run: npm ci

      - run: npm run lint
